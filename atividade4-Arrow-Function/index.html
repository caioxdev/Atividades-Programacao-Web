<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Funções</title>
</head>
<body>
  <div class="app-container">
    <h1>Calculadora de Abastecimento</h1>
      <div id="tabela-precos">
        <p>Tabela de Preços</p>
        <ul>
          <li>Gasolina: <strong>R$ 6,69</strong></li>
          <li>Etanol: <strong>R$ 5,89</strong></li>
          <li>Diesel: <strong>R$ 6,20</strong></li>
        </ul>
      </div>
      <form>
        <div class="inputs">
          <label for="">Tipo de Combustível</label>
          <select name="" id="combustivel">
            <option value="" disabled selected hidden>Escolha uma opção</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
          </select>
          <label for="">Informe a quantidade de litros</label>
          <input type="number" id="litros" step="0.1" min="0" />
        </div>
      </form>
      <section id="resultado">
        <h2>Resultado</h2>
        <p id="resultado">R$</p>
      </section>

      <div class='wave-bg'></div>
      <div class='wave-bg wave-bg2'></div>
      <div class='wave-bg wave-bg3'></div>
  </div>

    <script src="script.js"></script>
</body>
</html>
