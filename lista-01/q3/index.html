<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabuada</title>
    <style>
      body {
        text-align: center;
      }

      table {
        display: none;
        margin: 20px auto;
        border-collapse: collapse;
      }
    </style>
  </head>
  <body>
    <h1>Tabuada de um número</h1>

    <input type="text" placeholder="Digite um número" />
    <button>Calcular</button>

    <table id="tabela" border="1">
      <thead>
        <tr>
          <th>Conta</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>? x 1</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 2</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 3</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 4</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 5</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 6</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 7</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 8</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 9</td>
          <td>?</td>
        </tr>
        <tr>
          <td>? x 10</td>
          <td>?</td>
        </tr>
      </tbody>
    </table>

    <script src="script.js"></script>
  </body>
</html>
